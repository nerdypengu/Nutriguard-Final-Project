apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-scripts
  labels:
    app: locust
data:
  locustfile.py: |
    import uuid
    import random
    from locust import HttpUser, task, between

    class NutriGuardUser(HttpUser):
        wait_time = between(1, 4)

        def on_start(self):
            """
            Sign up a new unique user to get a JWT token.
            This provides a unique user session for each simulated worker user.
            """
            self.email = f"loadtest_{uuid.uuid4()}@example.com"
            password = "password123"
            self.pending_jobs = {}  # Store job_id -> timestamp for tracking
            
            # 1. Sign up to create the user account (we ignore the response since the token might be missing)
            self.client.post("/api/auth/signup", json={
                "email": self.email,
                "password": password
            }, name="/api/auth/signup")
            
            # 2. Sign in with the exact same credentials to properly grab the JWT token
            response = self.client.post("/api/auth/signin", json={
                "email": self.email,
                "password": password
            }, name="/api/auth/signin")
            
            if response.status_code == 200:
                data = response.json()
                if data.get("success"):
                    self.token = data.get("access_token")
                    self.user_id = data.get("user", {}).get("id")
                    
                    # Keep token headers for subsequent requests
                    self.client.headers.update({"Authorization": f"Bearer {self.token}"})

        @task(3)
        def view_all_foods(self):
            """Simulate user browsing the food library"""
            if self.token:
                self.client.get("/api/food/", name="/api/food/")

        @task(2)
        def search_food(self):
            """Simulate user searching for specific foods"""
            if self.token:
                queries = ["ayam", "nasi", "telur", "sapi", "susu", "pisang", "roti"]
                query = random.choice(queries)
                self.client.get(f"/api/food/search/by-name?name={query}", name="/api/food/search/by-name")

        @task(1)
        def process_meal_chat(self):
            """Simulate user asking the chat AI about a meal"""
            if self.token and self.user_id:
                messages = [
                    "Berapa kalori dalam 100g ayam goreng?",
                    "Apakah nasi padang sehat?",
                    "Saya makan 1 porsi sate ayam, berapa nutrisinya?",
                    "Berapa protein di 2 butir telur rebus?",
                    "Tolong analisa kandungan 1 mangkok salad buah."
                ]
                response = self.client.post("/api/meal-processing/chat", json={
                    "user_id": self.user_id,
                    "message": random.choice(messages)
                }, name="/api/meal-processing/chat")
                
                # Store job_id for polling
                if response.status_code == 200:
                    data = response.json()
                    job_id = data.get("job_id")
                    if job_id:
                        import time
                        self.pending_jobs[job_id] = time.time()

        @task(2)
        def check_meal_processing_result(self):
            """Poll the status of pending meal processing jobs"""
            if self.token and self.pending_jobs:
                # Get a job_id from pending jobs
                job_id = random.choice(list(self.pending_jobs.keys()))
                
                response = self.client.get(
                    f"/api/meal-processing/status/{job_id}",
                    name="/api/meal-processing/status"
                )
                
                # If completed, remove from pending jobs
                if response.status_code == 200:
                    data = response.json()
                    status = data.get("status")
                    
                    if status in ["COMPLETED", "FAILED"]:
                        self.pending_jobs.pop(job_id, None)
                elif response.status_code == 404:
                    # Job not found, remove from pending
                    self.pending_jobs.pop(job_id, None)

        @task(1)
        def create_meal_plan(self):
            """Simulate user creating a meal plan"""
            if not self.token or not self.user_id:
                return
                
            import datetime
            import random
            
            if not hasattr(self, 'known_meal_plan_ids'):
                self.known_meal_plan_ids = []
                
            today = datetime.date.today().isoformat()
            meal_types = ["BREAKFAST", "LUNCH", "DINNER", "ADDITIONAL"]
            food_names = ["Nasi Goreng Spesial", "Dada Ayam Bakar", "Salad Buah", "Oatmeal Pisang", "Smoothie Mangga"]
            
            payload = {
                "user_id": self.user_id,
                "meal_type": random.choice(meal_types),
                "meal_name": random.choice(food_names),
                "total_calories": round(random.uniform(200, 800), 2),
                "total_protein": round(random.uniform(5, 50), 2),
                "total_carbs": round(random.uniform(10, 80), 2),
                "total_fat": round(random.uniform(5, 40), 2),
                "planned_for_date": today,
                "status": "Planned"
            }
            
            response = self.client.post("/api/meal-plans/", json=payload, name="/api/meal-plans/")
            if response.status_code == 200:
                data = response.json()
                if data.get("success") and data.get("data", {}).get("id"):
                    self.known_meal_plan_ids.append(data["data"]["id"])

        @task(3)
        def fetch_meal_plans(self):
            """Simulate user fetching their meal plans"""
            if self.token and self.user_id:
                self.client.get(f"/api/meal-plans/user/{self.user_id}/current", name="/api/meal-plans/user/{id}/current")

        @task(1)
        def update_meal_plan_status(self):
            """Simulate user updating a meal plan status"""
            if self.token and hasattr(self, 'known_meal_plan_ids') and self.known_meal_plan_ids:
                import random
                plan_id = random.choice(self.known_meal_plan_ids)
                statuses = ["Planned", "In Progress", "Completed"]
                self.client.patch(f"/api/meal-plans/{plan_id}/status?status={random.choice(statuses)}", name="/api/meal-plans/{id}/status")

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  labels:
    app: locust-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-master
  template:
    metadata:
      labels:
        app: locust-master
    spec:
      containers:
      - name: locust-master
        image: locustio/locust
        # Run locust in master mode. Expose UI on 8089.
        command: ["locust", "-f", "/mnt/locust/locustfile.py", "--master"]
        ports:
        - containerPort: 8089
          name: web-ui
        - containerPort: 5557
          name: p2p-1
        - containerPort: 5558
          name: p2p-2
        volumeMounts:
        - name: locust-scripts
          mountPath: /mnt/locust
      volumes:
      - name: locust-scripts
        configMap:
          name: locust-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: locust-master
  labels:
    app: locust-master
spec:
  type: ClusterIP
  ports:
  - port: 8089
    targetPort: 8089
    name: web-ui
  - port: 5557
    targetPort: 5557
    name: p2p-1
  - port: 5558
    targetPort: 5558
    name: p2p-2
  selector:
    app: locust-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  labels:
    app: locust-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: locust-worker
  template:
    metadata:
      labels:
        app: locust-worker
    spec:
      containers:
      - name: locust-worker
        image: locustio/locust
        # Worker mode connecting to the master. We hit http://backend:8000 assuming your cluster backend service is named 'backend'
        command: ["locust", "-f", "/mnt/locust/locustfile.py", "--worker", "--master-host", "locust-master", "--host", "http://backend:8000"]
        volumeMounts:
        - name: locust-scripts
          mountPath: /mnt/locust
      volumes:
      - name: locust-scripts
        configMap:
          name: locust-scripts
