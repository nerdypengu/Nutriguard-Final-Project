name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-ci-cd:
    name: Frontend CI & Vercel Deployment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Or your preferred Node.js version
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json' # Adjust if using yarn or pnpm

      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

      - name: Build Frontend
        run: npm run build
      
      - name: Frontend Runtime Smoke Test
        run: |
          # Start Vite preview in the background (serves the 'dist' folder)
          npm run preview -- --port 4173 &
          
          # Give it a few seconds to start
          sleep 5
          
          # Check if the frontend is responding
          if curl -s http://localhost:4173 | grep -q "root"; then
            echo "✓ Frontend runtime smoke test passed!"
            pkill -f vite || true
          else
            echo "✗ Frontend runtime smoke test failed: Could not detect root div"
            pkill -f vite || true
            exit 1
          fi

  backend-ci:
    name: Backend CI Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Ensure this matches your .python-version or requirements
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint Backend
        working-directory: ./backend
        run: |
          pip install ruff
          ruff check .

      - name: Docker Build Test
        working-directory: ./backend
        run: |
          # Just validating that the docker image builds correctly as a CI step
          docker build -t backend:ci-test .
      
      - name: Backend Runtime Smoke Test
        working-directory: ./backend
        env:
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_KEY: "dummy-key"
          SUPABASE_SERVICE_ROLE_KEY: "dummy-service-key"
          SUPABASE_JWT_SECRET: "dummy-secret"
          KEYCLOAK_SERVER_URL: "https://example.keycloak.com"
          KEYCLOAK_REALM: "dummy"
          KEYCLOAK_CLIENT_ID: "dummy"
          KEYCLOAK_CLIENT_SECRET: "dummy"
        run: |
          # Install uvicorn if not present
          pip install uvicorn
          
          # Start uvicorn in the background
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          
          # Give it a few seconds to boot up
          sleep 5
          
          # Check health endpoint
          RESPONSE=$(curl -s http://127.0.0.1:8000/health)
          if [[ $RESPONSE == *"status\":\"ok"* ]]; then
            echo "✓ Backend health check passed!"
            # Kill the process
            pkill python || true
          else
            echo "✗ Backend health check failed: $RESPONSE"
            pkill python || true
            exit 1
          fi
