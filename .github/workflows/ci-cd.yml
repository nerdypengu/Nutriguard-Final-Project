name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-ci-cd:
    name: Frontend CI & Vercel Deployment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Or your preferred Node.js version
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json' # Adjust if using yarn or pnpm

      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint

      - name: Build Frontend
        run: npm run build

      # Optional: Deploy to Vercel via GitHub Actions CLI
      # This requires VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets set in your GitHub repo.
      # If you use the Vercel GitHub App integration instead, you can remove these steps.
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Frontend to Vercel (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel build --prod && vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  backend-ci:
    name: Backend CI Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Ensure this matches your .python-version or requirements
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint Backend
        working-directory: ./backend
        run: |
          pip install ruff
          ruff check .

      - name: Docker Build Test
        working-directory: ./backend
        run: |
          # Just validating that the docker image builds correctly as a CI step
          docker build -t backend:ci-test .
